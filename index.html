    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Tickerdle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tickerdle is a free daily word game where you guess the S&P 500 stock ticker symbol in 6 tries. It's like Wordle, but for stock market tickers. A new puzzle is released every day at midnight."
          }
        },
        {
          "@type": "Question",
          "name": "How do you play Tickerdle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Type any valid S&P 500 ticker symbol and press Enter. After each guess, the tiles change color: green means the letter is in the correct position, yellow means the letter is in the ticker but in the wrong spot, and gray means the letter is not in the ticker at all. You have 6 tries to guess the daily ticker."
          }
        },
        {
          "@type": "Question",
          "name": "Is Tickerdle free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Tickerdle is completely free to play. No sign-up, no subscription, no ads. Just visit tickerdle.org and start playing."
          }
        },

          "@type": "Question",
          "name": "What stock tickers are used in Tickerdle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All ticker symbols in Tickerdle are from S&P 500 companies — the 500 largest publicly traded companies in the United States, such as AAPL (Apple), MSFT (Microsoft), AMZN (Amazon), and GOOGL (Alphabet)."
          }
        },
        {
          "@type": "Question",
          "name": "Does Tickerdle have different game modes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Tickerdle has three modes: Daily (one new ticker per day), Endless (keep guessing as many as you want), and Higher/Lower (guess which company has the larger market cap)."
          }
        }
      ]
    }
