<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <title>Tickerdle — Guess the S&P 500 Ticker</title>
    <meta name="description"
      content="Guess the S&P 500 stock ticker symbol in 6 tries. A new puzzle every day — plus Endless and Higher/Lower modes." />

    <!-- ── Open Graph (Facebook, Discord, WhatsApp, iMessage, Slack) ───── -->
    <meta property="og:title"       content="Tickerdle" />
    <meta property="og:description" content="Guess the S&P 500 stock ticker in 6 tries." />
    <meta property="og:image"       content="https://tickerdle.org/og-image.png?v=3" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url"         content="https://tickerdle.org" />
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Tickerdle" />

    <!-- ── Twitter / X ──────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Tickerdle" />
    <meta name="twitter:description" content="Guess the S&P 500 stock ticker in 6 tries." />
    <meta name="twitter:image"       content="https://tickerdle.org/og-image.png?v=3" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <!-- SVG favicon (Chrome, Firefox, Edge — scales perfectly at any size) -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- PNG fallback for browsers that don't support SVG favicons (Safari) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
