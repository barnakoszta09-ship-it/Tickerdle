# nginx reverse-proxy config for tickerdle.org
# Tested with nginx 1.24+ and Certbot (Let's Encrypt).
#
# Setup steps on a fresh VPS:
#   1. Copy this file to /etc/nginx/sites-available/tickerdle.org
#   2. ln -s /etc/nginx/sites-available/tickerdle.org /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d tickerdle.org -d www.tickerdle.org
#      (Certbot will auto-edit this file to add SSL blocks)

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name tickerdle.org www.tickerdle.org;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Redirect www → apex ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.tickerdle.org;

    ssl_certificate     /etc/letsencrypt/live/tickerdle.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tickerdle.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://tickerdle.org$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name tickerdle.org;

    ssl_certificate     /etc/letsencrypt/live/tickerdle.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tickerdle.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (supplement Helmet on the Node side) ─────────────────
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "same-origin"     always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 1024;

    # ── Static frontend (Vite build output) ───────────────────────────────────
    root  /var/www/tickerdle/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Aggressive caching for hashed assets (Vite names them *.hash.js)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── WebSocket — live player counter ──────────────────────────────────────
    # Must come before /api/ so nginx matches /ws exactly.
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # These two headers are what upgrades HTTP → WebSocket
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep the WS connection open — default nginx timeout (60 s) would
        # kill idle connections before the client's 60 s heartbeat fires.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── API reverse proxy → Node.js ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Pass real client IP so express-rate-limit can use it
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Host              $host;

        # Remove the Upgrade header (not a WS endpoint)
        proxy_set_header   Upgrade           "";
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_read_timeout    15s;
        proxy_send_timeout    15s;

        # Don't expose the Node.js version header
        proxy_hide_header  X-Powered-By;
    }

    # ── Deny dot-files ────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
